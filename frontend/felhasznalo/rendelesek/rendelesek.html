<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendeléseim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
    <link rel="stylesheet" href="rendelesek.css">
</head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
            <img src="../../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> <!-- Oldal logója-->
    
            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" data-bs-display="static" data-bs-auto-close="outside"> Nyelv </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li><a class="dropdown-item" href="#"> Angol </a></li> <!-- Nyelvek -->
                            <li><a class="dropdown-item" href="#"> Magyar </a></li> 
                        </ul>
                    </li>
                </ul>
    
                <button class="btn btn-outline-secondary me-3" onclick="window.location.href=''">  Kosár </button> <!-- Kosár oldal     Ne biztos hogy jó lesz így-->
                <button class="btn btn-outline-success me-3" id="felhasznaloGomb" onclick="tagret = '_blank'">  Felhasználó </button> <!-- Felhasználói oldal -->
                <button class="btn btn-outline-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"> ☰ </button>
            </div>
        </div>
    </nav>
        
        <div class="offcanvas offcanvas-end" id="sidebarMenu">
            <div class="offcanvas-header">
                <h5>Kategóriák</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body" id="navbarKategoriak">
                <div class="btn-kat">Példa</div>
                <!-- Kategóriához visz, termék oldalra  majd backendből lesz feltöltve -->
            </div>
        </div>
    </div>
    <!-- navbar vége-->

<div class="container mt-5">
    <h2 class="mb-4">Rendeléseim</h2>

    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Dátum</th>
                <th>Végösszeg</th>
                <th>Státusz</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="rendelesLista">
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="rendelesek.js"></script>
</body>
</html>
