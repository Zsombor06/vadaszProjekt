<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felhasználó</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
    <link rel="stylesheet" href="./felhasznalo.css">
    <link id="nyelv" rel="stylesheet" type="text/css" href="../nyelv/magyar.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
        <div class="justify-content-start">
           <a href="../fooldal/fooldal.html" style="text-decoration: none;"> <img src="../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> </a><!-- Oldal logója-->
            <a href="../fooldal/fooldal.html"><img src="../képek/aranyagancs_szoveg.png" alt="SZOVEG" width="150" class="navbar-brand"></a>
        </div>


            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul  class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-navbar dropdown-toggle" data-bs-toggle="dropdown"> Nyelv/Language </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li id="magyar"><a class="dropdown-item" href="#">Magyar</a></li>
                            <li id="angol"><a class="dropdown-item" href="#">English</a></li>
                        </ul>
                    </li>
                </ul>
                <button lang="hu" class="btn btn-navbar me-3" id="kosarGomb">Kosár</button>
                <button lang="en" class="btn btn-navbar me-3" id="kosarGombEn">Basket</button>
                <button lang="hu" class="btn btn-navbar me-3" id="felhasznaloGomb">Felhasználó</button>
                <button lang="en" class="btn btn-navbar me-3" id="felhasznaloGombEn">User</button>
                <button class="btn btn-navbar" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">☰</button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 lang="hu">Kategóriák</h5>
            <h5 lang="en">Categories</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
        </div>
    </div>
    <!-- navbar vége-->


    <div class="container my-5 felhasznalo-container">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card felhasznalo-card p-4">
                    <h4>Adataid</h4>
                    <label>Felhasználónév</label>
                    <input type="text" id="fNev" class="form-control text-center" disabled>    
                    <label class="mt-3">Email</label>
                    <input type="email" id="fEmail" class="form-control text-center" disabled>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card felhasznalo-card p-4">
                    <h4>Jelszó módosítás</h4>
                    <div class="mb-3 position-relative">
                        <input type="password" id="regiJelszo" class="form-control text-center" placeholder="Régi jelszó">
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske">
                            <i class="bi bi-eye-slash fs-5" id="szembigyo"></i>
                        </button>
                    </div>
                    <div class="mb-3 position-relative">
                        <input type="password" id="ujJelszo" class="form-control text-center" placeholder="Új jelszó">
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske2">
                            <i class="bi bi-eye-slash fs-5" id="szembigyo2"></i>
                        </button>
                    </div>
                    <button id="btn_jMod" class="btn felhasznalo-btn">Jelszó módosítás</button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card felhasznalo-card p-4">
                    <h4>Szállítási címek</h4>
                    <select class="form-select mb-3" id="fLak"></select>
                    <input class="form-control mb-2" id="orszagMod" placeholder="Ország">
                    <input class="form-control mb-2" id="irszMod" placeholder="Irányítószám">
                    <input class="form-control mb-2" id="varosMod" placeholder="Város">
                    <input class="form-control mb-3" id="utcaMod" placeholder="Utca, házszám">
                    <input type="button" id="cimMod" class="btn felhasznalo-btn" value="Hozzáadás">
                </div>
            </div>
            <div class="col-md-12">
                <div class="card felhasznalo-card p-4">
                    <h4 class="mb-4">Rendeléseim</h4>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Dátum</th>
                                <th>Végösszeg</th>
                                <th>Státusz</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="rendelesLista"></tbody>
                    </table>
                </div>
            </div>        
        </div>
    </div>
    <input type="button" value="Kijelentkezés" id="kijelentkezes" class="btn btn-danger">


    <div class="modal fade rendeles-modal" id="rendelesModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Rendelés részletei</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>Termék</th>
                  <th>Egységár</th>
                  <th>Mennyiség</th>
                  <th>Részösszeg</th>
                </tr>
              </thead>
              <tbody id="rendelesReszletTbody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./felhasznalo.js"></script>
<script src="../bejelentkezesiStatus.js"></script>
<script src="../nyelv/nyelv.js"></script>

</html>
