<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felhasználó</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
    <link rel="stylesheet" href="./felhasznalo.css">
    <link id="nyelv" rel="stylesheet" type="text/css" href="../nyelv/magyar.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
        <div class="justify-content-start">
           <a href="../fooldal/fooldal.html" style="text-decoration: none;"> <img src="../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> </a><!-- Oldal logója-->
            <a href="../fooldal/fooldal.html"><img src="../képek/aranyagancs_szoveg.png" alt="SZOVEG" width="150" class="navbar-brand"></a>
        </div>


            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul  class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-navbar dropdown-toggle" data-bs-toggle="dropdown"> Nyelv/Language </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li id="magyar"><a class="dropdown-item" href="#">Magyar</a></li>
                            <li id="angol"><a class="dropdown-item" href="#">English</a></li>
                        </ul>
                    </li>
                </ul>
                <button lang="hu" class="btn btn-navbar me-3" id="kosarGomb">Kosár</button>
                <button lang="en" class="btn btn-navbar me-3" id="kosarGombEn">Basket</button>
                <button lang="hu" class="btn btn-navbar me-3" id="felhasznaloGomb">Felhasználó</button>
                <button lang="en" class="btn btn-navbar me-3" id="felhasznaloGombEn">User</button>
                <button class="btn btn-navbar" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">☰</button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 lang="hu">Kategóriák</h5>
            <h5 lang="en">Categories</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
        </div>
    </div>
    <!-- navbar vége-->

    <div class="container-fluid my-5 px-4">
        <div class="row">
            <div id="felhasznaloAdatok" class="mb-3 d-flex flex-column justify-content-center align-items-center col-sm-12" >
                <h3>Adataid:</h3><br>
                <label for="fNev"> Felhasználónév: </label> <input type="text" id="fNev" style="text-align: center;" class="w-25" disabled><br>
                <label for="fEmail"> Email: </label> <input type="email" id="fEmail" style="text-align: center;" class="w-25" disabled><br>
                <!--<label for="fSzamla"> zállításicím: </label> <input type="text" id="fSzamla" class="" disabled><br>-->
                <br>
                <div class="d-flex flex-column justify-content-center align-items-center w-100">
                    <h4>Jelszó módosítás:</h4>
                    <div class="mb-3 position-relative">
                        <input type="password" id="regiJelszo" class="form-control form-control-lg text-center" placeholder="Régi Jelszó" required>
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske" style="border: none; background: none;">
                            <i class="bi bi-eye-slash fs-4" id="szembigyo"></i>
                        </button>
                    </div>
                    <div class="mb-3 position-relative">
                        <input type="password" id="ujJelszo" class="form-control form-control-lg text-center" placeholder="Új Jelszó" required>
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske2" style="border: none; background: none;">
                            <i class="bi bi-eye-slash fs-4" id="szembigyo2"></i>
                        </button>
                    </div>
                    <input type="button" value="Jelszó módosítás" id="btn_jMod" >
                </div>
                <br>
                <div class="form-control mb-3 w-50">
                    <table class="table table-striped ">
                        <tr>
                            <td><label for="fLak">Szállításicím(ek) módosítása:</label></td>
                            <td><select class="lCim" name="fLak" id="fLak"></select></td>
                        </tr>
                        <tr>
                            <td><label for="orszagMod">Ország:</label></td>
                            <td><input class="lCim" id="orszagMod" type="text"></td>
                        </tr>
                        <tr>
                            <td><label for="irszMod">Irányítószám:</label></td>
                            <td><input class="lCim" id="irszMod" type="number"></td>
                        </tr>
                        <tr>
                            <td><label for="varosMod">Város:</label></td>
                            <td><input class="lCim" id="varosMod" type="text"></td>
                        </tr>
                        <tr>
                            <td><label for="utcaMod">Utca, házszám:</label></td>
                            <td><input class="lCim" id="utcaMod" type="text"></td>
                        </tr>
                        <tr>
                            <td colspan="2"><input type="button" id="cimMod" value="Hozzáadás" ></td>
                        </tr>
                    </table>
                </div>
            </div>    
        </div>

        <div class="container mt-5">
            <h2 class="mb-4">Rendeléseim</h2>

            <table class="table table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Dátum</th>
                        <th>Végösszeg</th>
                        <th>Státusz</th>
                        <th>Egyéb</th>
                    </tr>
                </thead>
                <tbody id="rendelesLista">
                </tbody>
            </table>
        </div>

        <div class="mb-3 d-flex flex-column justify-content-center align-items-center row">
            <input type="button" value="Kijelentkezés" id="btn_kij" class="btn btn-danger">
        </div>
        

    </div>
    <!-- Rendelés részletek Modal -->
<div class="modal fade" id="rendelesModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Rendelés részletei</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Termék</th>
              <th>Egységár</th>
              <th>Mennyiség</th>
              <th>Részösszeg</th>
            </tr>
          </thead>
          <tbody id="rendelesReszletTbody">
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./felhasznalo.js"></script>
<script src="../bejelentkezesiStatus.js"></script>
<script src="../nyelv/nyelv.js"></script>

</html>
