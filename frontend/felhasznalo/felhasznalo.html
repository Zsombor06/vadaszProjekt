<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felhasználó</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">
    <link rel="stylesheet" href="./felhasznalo.css">
</head>
<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
            <img src="../képek/" alt="LOGO" height="40" class="navbar-brand"> <!-- Oldal logója-->
    
            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" data-bs-display="static" data-bs-auto-close="outside"> Nyelv </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li><a class="dropdown-item" href="#"> Angol </a></li> <!-- Nyelvek -->
                            <li><a class="dropdown-item" href="#"> Magyar </a></li> 
                        </ul>
                    </li>
                </ul>
    
                <button class="btn btn-outline-secondary me-3" onclick="window.location.href=''">  Kosár </button> <!-- Kosár oldal     Ne biztos hogy jó lesz így-->
                <button class="btn btn-outline-success me-3" id="felhasznaloGomb" onclick="tagret = '_blank'">  Felhasználó </button> <!-- Felhasználói oldal -->
                <button class="btn btn-outline-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"> ☰ </button>
            </div>
        </div>
    </nav>
        
        <div class="offcanvas offcanvas-end" id="sidebarMenu">
            <div class="offcanvas-header">
                <h5>Kategóriák</h5>
                <button class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body" id="navbarKategoriak">
                <div class="btn-kat">Példa</div>
                <!-- Kategóriához visz, termék oldalra  majd backendből lesz feltöltve -->
            </div>
        </div>
    </div>
    <!-- navbar vége-->

    <div class="container-fluid my-5 px-4">
        <div class="row">
            <div id="felhasznaloAdatok" class="mb-3 d-flex flex-column justify-content-center align-items-center col-lg-6 col-sm-12" >
                <h3>Adataid:</h3><br>
                <label for="fNev"> Felhasználónév: </label> <input type="text" id="fNev" class="" disabled><br>
                <label for="fEmail"> Email: </label> <input type="email" id="fEmail" class="" disabled><br>
                <!--<label for="fSzamla"> zállításicím: </label> <input type="text" id="fSzamla" class="" disabled><br>-->
                <br>
                <div class="d-flex flex-column justify-content-center align-items-center w-100">
                    <h4>Jelszó módosítás:</h4>
                    <div class="mb-3 position-relative">
                        <input type="password" id="regiJelszo" class="form-control form-control-lg text-center" placeholder="Régi Jelszó" required>
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske" style="border: none; background: none;">
                            <i class="bi bi-eye-slash fs-4" id="szembigyo"></i>
                        </button>
                    </div>
                    <div class="mb-3 position-relative">
                        <input type="password" id="ujJelszo" class="form-control form-control-lg text-center" placeholder="Új Jelszó" required>
                        <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske2" style="border: none; background: none;">
                            <i class="bi bi-eye-slash fs-4" id="szembigyo2"></i>
                        </button>
                    </div>
                    <input type="button" value="Jelszó módosítás" id="btn_jMod" class="btn btn-info">
                </div>
                <br>
                <div class="form-control mb-3">
                    <table class="table table-striped">
                        <tr>
                            <td><label for="fLak">Szállításicím(ek) módosítása:</label></td>
                            <td><select name="fLak" id="fLak"></select></td>
                        </tr>
                        <tr>
                            <td><label for="orszagMod">Ország:</label></td>
                            <td><input id="orszagMod" type="text"></td>
                        </tr>
                        <tr>
                            <td><label for="irszMod">Irányítószám:</label></td>
                            <td><input id="irszMod" type="number"></td>
                        </tr>
                        <tr>
                            <td><label for="varosMod">Város:</label></td>
                            <td><input id="varosMod" type="text"></td>
                        </tr>
                        <tr>
                            <td><label for="utcaMod">Utca, házszám:</label></td>
                            <td><input id="utcaMod" type="text"></td>
                        </tr>
                        <tr>
                            <td colspan="2"><input type="button" id="cimMod" value="Módosítás" class="btn btn-info"></td>
                        </tr>
                    </table>
                </div>
            </div>
            <div id="rendelesiAdatok" class="mb-3 d-flex flex-column align-items-center col-lg-6 col-sm-12">
                <h3>Rendeléseid:</h3><br>
                <select id="rendelesLista">
                    <!-- Itt jelennek meg a rendelések -->
                </select><br>
                <p class="mb-3 position-relative" id="rendelesP" hidden>Rendelés adatai:</p>
                <div id="rendelesReszletek" class="mb-3 position-relative"></div>
            </div>
        </div>
        <div class="mb-3 d-flex flex-column justify-content-center align-items-center row">
            <input type="button" value="Kijelentkezés" id="btn_kij" class="btn btn-danger">
        </div>
        

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./felhasznalo.js"></script>
</html>
