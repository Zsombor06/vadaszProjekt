<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regisztráció</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <link rel="stylesheet" href="./regisztracio.css">
    <link id="nyelv" rel="stylesheet" type="text/css" href="../nyelv/magyar.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
        <div class="justify-content-start">
           <a href="../fooldal/fooldal.html" style="text-decoration: none;"> <img src="../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> </a><!-- Oldal logója-->
            <a href="../fooldal/fooldal.html"><img src="../képek/aranyagancs_szoveg.png" alt="SZOVEG" width="150" class="navbar-brand"></a>
        </div>


            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul  class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-navbar dropdown-toggle" data-bs-toggle="dropdown"> Nyelv/Language </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li id="magyar"><a class="dropdown-item" href="#">Magyar</a></li>
                            <li id="angol"><a class="dropdown-item" href="#">English</a></li>
                        </ul>
                    </li>
                </ul>
                <button lang="hu" class="btn btn-navbar me-3" id="kosarGomb">Kosár</button>
                <button lang="en" class="btn btn-navbar me-3" id="kosarGombEn">Basket</button>
                <button lang="hu" class="btn btn-navbar me-3" id="felhasznaloGomb">Felhasználó</button>
                <button lang="en" class="btn btn-navbar me-3" id="felhasznaloGombEn">User</button>
                <button class="btn btn-navbar" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">☰</button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 lang="hu">Kategóriák</h5>
            <h5 lang="en">Categories</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
        </div>
    </div>
    <!-- REGISZTRÁCIÓS FORM -->
    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <form class="p-4 rounded shadow reg-box">

            <!-- FELHASZNÁLÓI ADATOK -->
            <div class="mb-3">
                <input type="text" id="FnevIn" class="form-control form-control-lg text-center" placeholder="Felhasználónév" required>
            </div>

            <div class="mb-3 position-relative">
                <input type="password" id="FjelszoIn" class="form-control form-control-lg text-center" placeholder="Jelszó" required>
                <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske" style="border: none; background: none;">
                    <i class="bi bi-eye-slash fs-4"></i>
                </button>
            </div>

            <div class="mb-3 position-relative">
                <input type="password" id="FjelszoUjraIn" class="form-control form-control-lg text-center" placeholder="Jelszó megerősítés" required>
                <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske2" style="border: none; background: none;">
                    <i class="bi bi-eye-slash fs-4"></i>
                </button>
            </div>

            <div class="mb-3">
                <input type="email" id="FemailIn" class="form-control form-control-lg text-center" placeholder="Email cím" required>
            </div>

            <!-- SZÁMLÁZÁSI CÍM -->
            <h5 lang="hu" class="mt-3">Számlázási cím</h5>
            <h5 lang="en" class="mt-3">Billing address</h5>


            <div class="mb-3">
                <input type="text" id="SzamlOrszag" class="form-control form-control-lg text-center" placeholder="Ország" required>
            </div>

            <div class="mb-3">
                <input type="number" id="SzamlIr" class="form-control form-control-lg text-center" placeholder="Irányítószám" required>
            </div>

            <div class="mb-3">
                <input type="text" id="SzamlVaros" class="form-control form-control-lg text-center" placeholder="Város" required>
            </div>

            <div class="mb-3">
                <input type="text" id="SzamlUtca" class="form-control form-control-lg text-center" placeholder="Utca, házszám" required>
            </div>

            <!-- SZÁLLÍTÁSI CÍM -->
            <h5 lang="hu" class="mt-3">Szállítási cím</h5>
            <h5 lang="en" class="mt-3">Shipping address</h5>


            <div class="mb-3">
                <input type="text" id="FlakOrszag" class="form-control form-control-lg text-center" placeholder="Ország" required>
            </div>

            <div class="mb-3">
                <input type="number" id="FlakIr" class="form-control form-control-lg text-center" placeholder="Irányítószám" required>
            </div>

            <div class="mb-3">
                <input type="text" id="FlakVaros" class="form-control form-control-lg text-center" placeholder="Város" required>
            </div>

            <div class="mb-3">
                <input type="text" id="FlakUtca" class="form-control form-control-lg text-center" placeholder="Utca, házszám" required>
            </div>

            <!-- GOMBOK -->
            <div  class="d-grid">
                <input lang="hu" type="button" value="Regisztráció" id="RegGomb" class="btn btn-dark btn-lg">
            </div>
            <div  class="d-grid">
                <input lang="en" type="button" value="Register" id="RegGombEn" class="btn btn-dark btn-lg">
            </div>

            <label lang="hu" class="form-label text-center w-100 mt-2">Már van fiókod? Jelentkezz be:</label>
            <label lang="en" class="form-label text-center w-100 mt-2">You already have an account? Log in:</label>


            <div class="d-grid mb-3">
                <input  lang="hu" type="button" value="Bejelentkezés" id="BejGomb" class="btn btn-outline-dark btn-lg">
            </div>
            <div  class="d-grid mb-3">
                <input lang="en" type="button" value="Login" id="BejGombEn" class="btn btn-outline-dark btn-lg">
            </div>
        </form>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./regisztracio.js"></script>
<script src="../bejelentkezesiStatus.js"></script>
<script src="../nyelv/nyelv.js"></script>


</body>
</html>
