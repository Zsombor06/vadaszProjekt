<!DOCTYPE html>
<html lang="hu">
<head>

    <title>Bejelentkezés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./bejelentkezes.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid px-4">
        <img src="../képek/" alt="LOGO" height="40" class="navbar-brand"> <!-- Oldal logója-->

        <div class="d-flex flex-wrap justify-content-end" id="menuElems">
            <ul class="navbar-nav me-3">
                <li class="nav-item dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown" data-bs-display="static" data-bs-auto-close="outside"> Nyelv </button>
                    <ul class="dropdown-menu dropdown-menu-start">
                        <li><a class="dropdown-item" href="#" >Angol </a></li> <!-- Nyelvek -->
                        <li><a class="dropdown-item" href="#"> Magyar </a></li> 
                    </ul>
                </li>
            </ul>

            <button class="btn btn-outline-secondary me-3" onclick="window.location.href=''">  Kosár </button> <!-- Kosár oldal     Ne biztos hogy jó lesz így-->
            <button class="btn btn-outline-success me-3" onclick="window.location.href=''">  Felhasználó </button> <!-- Felhasználói oldal -->
            <button class="btn btn-outline-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu"> ☰ </button>
        </div>
    </div>
</nav>
    
    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5>Kategóriák</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
            <div class="btn-kat">Példa</div>
            <!-- Kategóriához visz, termék oldalra  majd backendből lesz feltöltve -->
        </div>
    </div>
<!-- navbar vége-->
    
<!--body __ Bejelentkezés-->
<div class="d-flex justify-content-center align-items-center min-vh-100">
    <form class="p-4 rounded shadow login-box">
        <div class="mb-3">
            <input type="text" id="FnevIn" class="form-control form-control-lg text-center" placeholder="felhasználó név">
        </div>
        <div class="mb-3 position-relative">
            <input type="password" id="FjelszoIn" class="form-control form-control-lg text-center" placeholder="jelszó">
            <button type="button" class="btn position-absolute top-50 end-0 translate-middle-y me-2" id="szemecske" style="border: none; background: none;">
                <i class="bi bi-eye-slash fs-4" id="szembigyo"></i>
            </button>
        </div>
        <div class="d-grid">
           <input type="button" value="Bejelentkezés" id="BejGomb" class="btn btn-dark btn-lg">
       </div>

        <label for="RegGomb" class="form-label text-center w-100 mt-2">Nincs még fiókod? Regisztrálj: </label>
        <div class="d-grid mb-3">
            <input type="button" name="RegGomb" value="Regisztráció" id="RegGomb" class="btn btn-outline-dark btn-lg">
        </div>
    </form>
    <!-- <div id="phpvalasz" class="alert d-none w-50 text-center"> </div> -->
</div>

<!--footer-->
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
