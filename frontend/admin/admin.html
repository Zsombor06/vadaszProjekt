<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Felület</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./admin.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
        <div class="justify-content-start">
           <a href="../fooldal/fooldal.html" style="text-decoration: none;"> <img src="../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> </a><!-- Oldal logója-->

            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul  class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-navbar dropdown-toggle" data-bs-toggle="dropdown"> <img src="../képek/nyelv.png" alt="Language" style="max-width: 20px;"> </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li id="magyar"><a class="dropdown-item" href="#">Magyar</a></li>
                            <li id="angol"><a class="dropdown-item" href="#">English</a></li>
                        </ul>
                    </li>
                </ul>
                <button  class="btn btn-navbar me-3" id="kosarGomb">Kosár</button>
                <button  class="btn btn-navbar me-3" id="felhasznaloGomb">Felhasználó</button>
                <button class="btn btn-navbar" data-bs-toggle="offcanvas" id="termekGomb" data-bs-target="#sidebarMenu">Termékek</button>
            </div>
        </div>

    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5 id="szoveg3">Kategóriák</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
        </div>
    </div>
<!-- navbar vége-->
<div class="admin-container">
    <div class="admin-panel shadow">
        <div class="container my-5 admin-wrapper">
            <div class="card p-4 shadow-sm admin-topbar">
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Adat kiválasztása</label>
                        <select class="form-select" id="tablaValaszt">
                            <option value="">Kérem válasszon egy adatot!</option>
                            <option value="felhasznalo">Felhasználó</option>
                            <option value="termék">Termék</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Művelet</label>
                        <select class="form-select" id="muveletValaszt">
                            <option value="">Kérem válasszon műveletet</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card admin-card p-4 shadow-sm" id="ujFelhasznaloDiv" hidden>
            <label>Név:</label>     <input class="form-control" style="width:auto;" type="text" id="ujNev"><br>
            <label>Email:</label>   <input class="form-control" style="width:auto;" type="email" id="ujEmail"><br>
            <label><b>Számlázásicím:</b></label><br>
            <label>Ország:</label>  <input class="form-control" style="width:auto;" type="text" id="ujorszagSzamla"><br>
            <label>Irányítószám:</label>    <input class="form-control" style="width:auto;" type="number" id="ujirszSzamla"><br>
            <label>Város:</label>   <input class="form-control" style="width:auto;" type="text" id="ujvarosSzamla"><br>
            <label>Utca:</label>    <input class="form-control" style="width:auto;" type="text" id="ujutcaSzamla"><br>
            <label for="">Rang Id:</label>
            <select class="form-select" style="width:auto;" name="" id="rangok"></select>
            <br>
            <input type="button" class="btn btn-admin" id="ujFelhasznalo" value="Feltöltés">
        </div><!-- Felhasználó feltöltés-->
        
        <div class="card admin-card p-4 shadow-sm" id="modositFelhasznaloDiv" hidden>
            <label for="">Felhasználó neve:</label>
            <select class="form-select" style="width:auto;" name="" id="felhasznalok"></select>
            <br>
            <label >Email:</label><input  class="form-control" style="width:auto;" type="email" id="modositEmail"><br>
            <label ><b>Számlázásicím:</b></label><br>
            <label >Ország:</label><input  class="form-control" style="width:auto;" type="text" id="modositorszagSzamla"><br>
            <label >Irányítószám:</label><input  class="form-control" style="width:auto;" type="number" id="modositirszSzamla"><br>
            <label >Város:</label><input  class="form-control" style="width:auto;" type="text" id="modositvarosSzamla"><br>
            <label >Utca:</label><input  class="form-control" style="width:auto;" type="text" id="modositutcaSzamla"><br>
            <label for="">Rang Id:</label>
            <select class="form-select" style="width:auto;" name="" id="rangok"></select><br>
            <input  type="button"  class="btn btn-admin" id="modositFelhasznalo" value="Módosítás">
        </div><!--Felhasználó módosítás-->
        
        <div class="card admin-card p-4 shadow-sm" id="torlesFelhasznaloDiv" hidden>
            <label for="">Felhasználó neve:</label>
            <select class="form-select" style="width:auto;" name="" id="felhasznalok"></select><br>
            <input  type="button"  class="btn btn-admin" id="torolFelhasznalo" value="Törlés">
        </div><!--Felhasználó törlés-->
        
        
        <div class="card admin-card p-4 shadow-sm" id="ujTermekDiv" hidden>
            <label >Név:</label><input  class="form-control" style="width:auto;" type="text" id="ujTermekNev"><br>
            <label >Angol Név:</label><input  class="form-control" style="width:auto;" type="text" id="ujEnNev"><br>
            <label >Leírás:</label><input  class="form-control" style="width:auto;" type="text" id="ujLeiras"><br>
            <label >Angol Leírás:</label><input  class="form-control" style="width:auto;" type="text" id="ujEnLeiras"><br>
            <label >Ár:</label><input  class="form-control" style="width:auto;" type="number" id="ujAr"><br>
            <label >Készleten:</label><input  class="form-control" style="width:auto;" type="number" id="ujRaktar"><br>
            <label for="">Kategóriák</label>
            <select class="form-select" style="width:auto;" name="" id="kategoriak"></select><br>
            <label for="">Leárazás mértéke</label>
            <select class="form-select" style="width:auto;" name="" id="learazasok"></select><br>
            <form action="" enctype="multipart/form-data">
            <label for="">Kép:</label>
            <input type="file" class="form-control" style="width: auto;" name="" id="ujKep">
            </form><br>
            <input type="button"  class="btn btn-admin" id="ujTermek" value="Feltöltés">
        </div><!-- Termék feltöltés-->
        
        
        <div class="card admin-card p-4 shadow-sm" id="modositTermekDiv" hidden>
            <label >Nevek:</label>
            <select class="form-select" style="width: auto;" name="" id="termekNevek"></select><br>
            <label >Név:</label>
            <input  class="form-control" style="width:auto;" type="text" id="modositNev"><br>
            <label >Angol Név:</label><input  class="form-control" style="width:auto;" type="text" id="modositEnNev"><br>
            <label >Leírás:</label><input  class="form-control" style="width:auto;" type="text" id="modositLeiras"><br>
            <label >Angol Leírás:</label><input  class="form-control" style="width:auto;" type="text" id="modositEnLeiras"><br>
            <label >Ár:</label><input  class="form-control" style="width:auto;" type="number" id="modositAr"><br>
            <label >Készleten:</label><input  class="form-control" style="width:auto;" type="number" id="modositRaktar"><br>
            <label for="">Kategóriák</label>
            <select class="form-select" style="width:auto;" name="" id="kategoriak"></select><br>
            <label for="">Leárazás mértéke</label>
            <select class="form-select" style="width:auto;" name="" id="learazasok"></select><br>
            <label for="">Kép:</label>
            <input type="file" class="form-control" style="width: auto;" name="" id="modositKep"><br>
            <input    type="button"  class="btn btn-admin" id="modositTermek" value="Módosítás">
        </div><!-- Termék módosítása-->
        
        <div class="card admin-card p-4 shadow-sm" id="torlesTermekDiv" hidden>
            <label >Név:</label>
            <select class="form-select" style="width:auto;" name="" id="termekNevek"></select><br>
            <input   type="button"  class="btn btn-admin" value="Törlés" id="torlesTermek">
        </div> <!-- Termék törlése-->
    </div>
</div>
<div id="muveletEredmeny"></div>

<div class="row m-2">
<div class="col-md-6 col-sm-12">
    <div class="card felhasznalo-card p-4">
        <h4>Törzsvásárlók</h4>
        <div class="chart-wrapper" style="position: relative; height: 280px; width: 100%;">
            <canvas id="koltoChart"></canvas>
        </div>
    </div>
</div>

<div class="col-md-6 col-sm-12">
    <div class="card felhasznalo-card p-4">
        <h4>Legkellendőbb termékek</h4>
        <div class="chart-wrapper" style="position: relative; height: 280px; width: 100%;">
            <canvas id="termekChart"></canvas>
        </div>
    </div>
</div>
</div>

<input class="btn btn-admin" type="button" value="Kijelentkezés" id="kijelentkezes">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./admin.js"></script>
<script src="../bejelentkezesiStatus.js"></script>

</body>
</html>
