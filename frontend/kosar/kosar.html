<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosár</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <link rel="stylesheet" href="./kosar.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid px-4">
        <div class="justify-content-start">
           <a href="../fooldal/fooldal.html" style="text-decoration: none;"> <img src="../képek/aranyagancs_logo.png" alt="LOGO" width="60" class="navbar-brand"> </a><!-- Oldal logója-->
            <a href="../fooldal/fooldal.html"><img src="../képek/aranyagancs_szoveg.png" alt="SZOVEG" width="150" class="navbar-brand"></a>
        </div>


            <div class="d-flex flex-wrap justify-content-end" id="menuElems">
                <ul class="navbar-nav me-3">
                    <li class="nav-item dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown"> Nyelv </button>
                        <ul class="dropdown-menu dropdown-menu-start">
                            <li><a class="dropdown-item" href="#">Angol</a></li>
                            <li><a class="dropdown-item" href="#">Magyar</a></li>
                        </ul>
                    </li>
                </ul>

                <button class="btn btn-outline-secondary me-3" id="kosarGomb" disabled>Kosár</button>
                <button class="btn btn-outline-success me-3" id="felhasznaloGomb">Felhasználó</button>
                <button class="btn btn-outline-dark" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">☰</button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" id="sidebarMenu">
        <div class="offcanvas-header">
            <h5>Kategóriák</h5>
            <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="navbarKategoriak">
        </div>
    </div>

    <div class="kosar-body">
        <div class="kosar-terulet g-4 my-4">
            <div class="col-12 mb-3">
                <section class="kosar-lista">
                    <h2>Kosár tartalma</h2>
                    <form>
                        <ul id="KosarTartalom" class="kosar-ul"></ul>
                        <button type="button" class="btn btn-success" onclick="window.location.href='../termekek/termekek.html'">További termék hozzáadása</button>
                    </form>
                </section>
            </div>
            <div class="col-12 mb-3">
                <section class="kosar-ossz">
                    <h2 class="mb-3">Összegzés</h2>
                    <div class="vegosszegSor input-group mb-3">
                        <span class="input-group-text">Végösszeg: </span>
                        <strong class="form-control" id="vegosszeg">0 Ft</strong>
                    </div>
                    <div class="szCimSor input-group mb-3">
                       <label class="input-group-text" for="szallitasicimek">Válasszon szállítási címet:</label>
                       <select name="szallitasicimek" id="szCimMezo" class="form-control">
                           <option value="">...</option>
                       </select>
                       <!--Fizetési módok???-->
                    </div>
                    <button type="button" class="fizetes-gomb w-100"> Fizetés </button>
                </section>
            </div>
        </div>
    </div>

    <div class="modal fade" id="torlesModal" tabindex="-1" role="dialog" aria-labelledby="torlesModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="torlesModalLabel">Törlés megerősítése</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            Biztosan törölni szeretné a terméket a kosárból? <br>
            Ezt a műveletet nem lehet visszavonni! <br>
            <p id="modalHibaMezo"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Mégsem</button>
            <button type="button" class="btn btn-danger" id="torlesConfirm">Törlés</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../bejelentkezesiStatus.js"></script>

    <script type="module" src="./kosar.js"></script>

</body>
</html>
